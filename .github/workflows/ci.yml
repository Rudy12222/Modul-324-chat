name: CI

on:
  pull_request:
    branches:
      - development
      - master
  push:
    branches:
      - development

jobs:
  checks:
    runs-on: self-hosted

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Code linten
        run: npm run lint

      - name: Tests ausführen
        run: npm test

      - name: Build ausführen
        run: npm run build

      - name: Docker Build prüfen
        run: docker build -t m324-chat-ci .
